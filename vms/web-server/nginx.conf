worker_processes 1;

events {
    worker_connections 1024;
}

http {
    log_format kafka '$remote_addr - [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_user_agent"';

    access_log /var/log/nginx/access.log kafka;
    error_log  /var/log/nginx/error.log;

    server {
        listen 80;
        server_name web-server;
        root /var/www/html;

        location / {
            index index.html;
        }

        location /admin {
            return 403 "Forbidden";
        }
        location /wp-admin {
            return 403 "Forbidden";
        }
        location /phpmyadmin {
            return 403 "Forbidden";
        }

        location ~ /\. {
            return 404;
        }
    }
}
